<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>choyu111</title>
    <link rel="icon" href="resources/avatar1.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #F5F0E8;
            color: #2A2520;
            display: flex;
        }

        /* Warm ambient blobs behind everything */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }

        body::before {
            width: 500px;
            height: 500px;
            background: rgba(230, 175, 120, 0.18);
            top: -120px;
            right: 15%;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: rgba(220, 160, 100, 0.12);
            bottom: -80px;
            left: 25%;
        }

        /* Warm doodle-like strokes on the background */
        .bg-doodles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-doodles svg {
            position: absolute;
            opacity: 0.28;
        }

        .doodle-1 {
            top: 8%;
            right: 30%;
            width: 180px;
            transform: rotate(-15deg);
        }

        .doodle-2 {
            bottom: 15%;
            left: 5%;
            width: 140px;
            transform: rotate(25deg);
        }

        .doodle-4 {
            top: 20%;
            left: 18%;
            width: 100px;
            transform: rotate(40deg);
        }

        /* ── Left: Info (horizontal stretch) ── */
        .info-panel {
            width: 46%;
            min-width: 340px;
            padding: 0 40px;
            padding-left: 8%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.8rem, 4.2vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.01em;
            line-height: 1.05;
            margin-bottom: 8px;
            color: #1A1714;
        }

        .tagline {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.24em;
            color: #9B8B76;
            margin-bottom: 36px;
            font-weight: 400;
        }

        .divider {
            width: 36px;
            height: 1px;
            background: #C4956A;
            margin-bottom: 28px;
            animation: growLine 0.6s ease 0.3s forwards;
            transform-origin: left;
            transform: scaleX(0);
        }

        @keyframes growLine {
            to { transform: scaleX(1); }
        }

        /* Avatar — doubled */
        .avatar-slot {
            width: 136px;
            height: 136px;
            border-radius: 50%;
            background: #E8E0D4;
            border: 2px solid #DDD4C6;
            margin-bottom: 24px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Contact */
        .contact-list {
            list-style: none;
            margin-bottom: 32px;
        }

        .contact-list li {
            font-size: 0.9rem;
            color: #5A534A;
            margin-bottom: 10px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .contact-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #A09585;
            min-width: 50px;
            flex-shrink: 0;
        }

        /* Intro — wide horizontal */
        .intro-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            line-height: 1.85;
            color: #5A5550;
            font-style: italic;
            font-weight: 400;
            max-width: 520px;
            margin-bottom: 36px;
            column-count: 2;
            column-gap: 32px;
            column-rule: 1px solid #DDD4C6;
        }

        /* GitHub */
        .social-links {
            display: flex;
            gap: 16px;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #5A534A;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-link:hover {
            color: #C4956A;
            transform: translateY(-1px);
        }

        .social-link svg {
            width: 20px;
            height: 20px;
        }

        /* ── Right: Art ── */
        .art-panel {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 0;
            overflow: hidden;
        }

        .figure-bg {
            height: 94vh;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            opacity: 0.88;
            filter: saturate(0.8);
            transition: opacity 0.6s ease, filter 0.6s ease;
            will-change: transform;
        }

        .figure-bg:hover {
            opacity: 1;
            filter: saturate(1);
        }

        /* Lottie — bare, no circle, scaled up */
        .lottie-corner {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 5;
            width: 220px;
            height: 294px; /* preserve 3:4 aspect of the figure */
            opacity: 0.7;
            transition: opacity 0.4s ease;
            overflow: visible;
        }

        .lottie-corner:hover {
            opacity: 1;
        }

        .lottie-corner > div {
            width: 100%;
            height: 100%;
        }

        /* ── Entrance ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .info-panel > * {
            opacity: 0;
            animation: fadeUp 0.7s ease forwards;
        }

        .info-panel > :nth-child(1) { animation-delay: 0.05s; }
        .info-panel > :nth-child(2) { animation-delay: 0.15s; }
        .info-panel > :nth-child(3) { animation-delay: 0.25s; }
        .info-panel > :nth-child(4) { animation-delay: 0.35s; }
        .info-panel > :nth-child(5) { animation-delay: 0.45s; }
        .info-panel > :nth-child(6) { animation-delay: 0.55s; }
        .info-panel > :nth-child(7) { animation-delay: 0.65s; }

        .art-panel {
            opacity: 0;
            animation: fadeIn 1s ease 0.4s forwards;
        }

        .lottie-corner {
            opacity: 0;
            animation: fadeIn 0.8s ease 1s forwards;
        }

        /* ── Subtle mouse parallax on figure ── */
        .figure-bg {
            transition: opacity 0.6s ease, filter 0.6s ease, transform 0.3s ease-out;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            html, body { overflow-y: auto; overflow-x: hidden; }

            body { flex-direction: column; }

            .info-panel {
                width: 100%;
                min-width: unset;
                padding: 36px 24px 28px;
                padding-left: 24px;
            }

            .art-panel {
                min-height: 50vh;
                order: -1;
            }

            .figure-bg {
                height: 100%;
                max-height: 50vh;
            }

            .intro-text {
                max-width: 100%;
                column-count: 1;
            }

            .lottie-corner {
                width: 140px;
                height: 187px;
                bottom: 10px;
                right: 10px;
            }
        }

        @media (max-width: 480px) {
            .info-panel { padding: 24px 18px 20px; padding-left: 18px; }
            .name { font-size: 2.2rem; }
            .avatar-slot { width: 100px; height: 100px; }
            .lottie-corner { width: 100px; height: 133px; }
        }
    </style>
</head>
<body>

    <!-- Background doodle strokes -->
    <div class="bg-doodles">
        <!-- Loose arc -->
        <svg class="doodle-1" viewBox="0 0 180 60" fill="none" stroke="#D4956A" stroke-width="2.5" stroke-linecap="round">
            <path d="M5 50 Q45 5 90 30 T175 20"/>
        </svg>
        <!-- Small circle cluster -->
        <svg class="doodle-2" viewBox="0 0 140 80" fill="none" stroke="#C9A87C" stroke-width="2" stroke-linecap="round">
            <circle cx="30" cy="40" r="18"/>
            <circle cx="70" cy="25" r="12"/>
            <circle cx="105" cy="50" r="15"/>
        </svg>
        <!-- Cross-hatch scribble -->
        <svg class="doodle-4" viewBox="0 0 100 100" fill="none" stroke="#C9A87C" stroke-width="1.8" stroke-linecap="round">
            <path d="M15 15 L85 85"/>
            <path d="M85 15 L15 85"/>
            <path d="M50 10 L50 90"/>
            <path d="M10 50 L90 50"/>
        </svg>
    </div>

    <!-- Info Panel -->
    <section class="info-panel">
        <h1 class="name">Chuyue</h1>
        <p class="tagline">Developer · Builder</p>
        <div class="divider" role="separator"></div>

        <div class="avatar-slot">
            <img src="resources/avatar1.svg" alt="Avatar">
        </div>

        <ul class="contact-list">
            <li>
                <span class="contact-label">WeChat</span>
                <span>abczhangcy</span>
            </li>
            <li>
                <span class="contact-label">Email</span>
                <span>zhangchuyue123@hotmail.com</span>
            </li>
        </ul>

        <p class="intro-text">
            A clueless developer who does not know what he wants to do rn.
        </p>

        <div class="social-links">
            <a href="https://github.com/choyu111" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="GitHub">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.79-.26.79-.58v-2.23c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.33-1.75-1.33-1.75-1.09-.75.08-.73.08-.73 1.21.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.3 3.49.99.11-.77.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23.96-.27 1.98-.4 3-.41 1.02.01 2.04.14 3.01.41 2.29-1.55 3.3-1.23 3.3-1.23.65 1.65.24 2.87.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.19.69.8.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
            </a>
        </div>
    </section>

    <!-- Art Panel -->
    <section class="art-panel" id="artPanel">
        <img
            src="resources/self_portrait_figure.svg"
            alt="Self Portrait"
            class="figure-bg"
            id="figureBg"
        >

        <!-- Lottie rotation — bare, no container chrome -->
        <div class="lottie-corner" id="lottieContainer"></div>
    </section>

    <script>
        // Lottie animation via lottie-web (bodymovin)
        lottie.loadAnimation({
            container: document.getElementById('lottieContainer'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'resources/self_portrait_figure_fadein_lottiejson_animation.json'
        });

        // Subtle parallax on the figure following the cursor
        const figure = document.getElementById('figureBg');
        const artPanel = document.getElementById('artPanel');

        artPanel.addEventListener('mousemove', (e) => {
            const rect = artPanel.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            figure.style.transform = `translate(${x * -8}px, ${y * -6}px)`;
        });

        artPanel.addEventListener('mouseleave', () => {
            figure.style.transform = 'translate(0, 0)';
        });
    </script>
</body>
</html>
